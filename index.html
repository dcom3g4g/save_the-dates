<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Save the Date</title>\n    <style>\n        body {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f2f2f2;\n        }\n        .container {\n            text-align: center;\n        }\n        img {\n            max-width: 100%;\n            height: auto;\n        }\n        .love-image {\n            width: 300px;\n        }\n        .timer {\n            font-size: 2rem;\n            margin: 20px 0;\n        }\n        .side-images {\n            display: flex;\n            justify-content: space-between;\n            width: 80%;\n            max-width: 800px;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Save the Date!</h1>\n        <img src="/path/to/love-image.jpg" alt="Love Image" class="love-image">\n        <div class="timer" id="timer">0 days 0 hours 0 minutes 0 seconds</div>\n        <div class="side-images">\n            <img src="/path/to/person1-image.jpg" alt="Person 1 Image">\n            <img src="/path/to/person2-image.jpg" alt="Person 2 Image">\n        </div>\n    </div>\n    <script>\n        const eventDate = new Date('2026-04-21T00:00:00Z').getTime();\n        function updateTimer() {\n            const now = new Date().getTime();\n            const distance = now - eventDate;\n            const days = Math.floor(distance / (1000 * 60 * 60 * 24));\n            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));\n            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));\n            const seconds = Math.floor((distance % (1000 * 60)) / 1000);\n            document.getElementById('timer').innerHTML = days + ' days ' + hours + ' hours ' + minutes + ' minutes ' + seconds + ' seconds';\n        }\n        setInterval(updateTimer, 1000);\n    </script>\n</body>\n</html>
